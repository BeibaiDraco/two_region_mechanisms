seed: 3
device: auto
output_dir: outputs/smoke/redundant_lowrank

task:
  name: RedundantInputControlTask
  params:
    seed: 3

model:
  name: TwoRegionLowRankCommRNN
  params:
    hidden_size_a: 24
    hidden_size_b: 24
    rank: 6
    dt: 0.1
    tau_a: 1.0
    tau_b: 1.5
    reciprocal: false
    noise_std: 0.0

train:
  steps: 20
  batch_size: 16
  learning_rate: 0.003
  eval_every: 5
  val_batches: 3
  grad_clip: 1.0
  activity_reg: 0.0001
  weight_reg: 0.000001
  communication_reg: 0.0

analysis:
  effect_threshold: 0.10
  direct_threshold: 0.05
  modulation_threshold: 0.03
