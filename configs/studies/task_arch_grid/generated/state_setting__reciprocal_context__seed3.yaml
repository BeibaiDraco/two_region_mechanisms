study:
  name: task_arch_grid_v1
  task_key: state_setting
  architecture_key: reciprocal_context
  seed: 3
seed: 3
device: auto
task:
  name: StateSettingTask
  params:
    seed: 3
    cue_len: 8
    signal_len: 24
    delay_len: 20
    response_len: 16
    noise_std: 0.2
model:
  name: TwoRegionReciprocalContextRNN
  params:
    hidden_size_a: 64
    hidden_size_b: 64
    dt: 0.1
    tau_a: 1.0
    tau_b: 2.0
    reciprocal: true
    noise_std: 0.0
    context_gain: 1.0
train:
  steps: 1000
  batch_size: 64
  learning_rate: 0.001
  eval_every: 50
  val_batches: 8
  grad_clip: 1.0
  activity_reg: 0.0001
  weight_reg: 1.0e-06
  communication_reg: 0.0
  early_stop_patience: 5
  early_stop_target_acc: 0.95
analysis:
  effect_threshold: 0.12
  direct_threshold: 0.06
  modulation_threshold: 0.04
output_dir: outputs/studies/task_arch_grid/runs/state_setting__reciprocal_context__seed3
