seed: 12
device: auto
output_dir: outputs/experiments/delayed_gated

task:
  name: DelayedCategorizationTask
  params:
    seed: 12
    delay_len: 24
    noise_std: 0.22

model:
  name: TwoRegionGatedRNN
  params:
    hidden_size_a: 64
    hidden_size_b: 64
    dt: 0.1
    tau_a: 1.0
    tau_b: 1.9
    reciprocal: false
    noise_std: 0.0

train:
  steps: 1000
  batch_size: 64
  learning_rate: 0.001
  eval_every: 2
  val_batches: 8
  grad_clip: 1.0
  activity_reg: 0.0001
  weight_reg: 0.000001
  communication_reg: 0.00001
  early_stop_patience: 5
  early_stop_target_acc: 0.95

analysis:
  effect_threshold: 0.12
  direct_threshold: 0.06
  modulation_threshold: 0.04
